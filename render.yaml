# Render Blueprint — deploy tự động khi push lên GitHub.
# Tạo kèm 1 Postgres free và tự nối DATABASE_URL + sinh SECRET_KEY.
databases:
  - name: anime-db
    plan: free

services:
  - type: web
    name: anime-finder
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: anime-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
